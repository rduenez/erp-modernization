events {}
http {
    # DDoS PROTECTION: Define a rate-limiting zone.
    # We restrict users to 2 requests per second based on their IP address.
    limit_req_zone $binary_remote_addr zone=ddos_limit:10m rate=2r/s;
    server {
        listen 80;
        # 1. Public API Endpoint (Rate Limited)
        location /api/public/ {
            # Apply the rate limit. Allow a burst of 5 rapid requests before blocking.
            limit_req zone=ddos_limit burst=5 nodelay;            
            # Forward traffic to the isolated private subnet container
            proxy_pass http://erp-backend:5060;
        }
        # 2. FIREWALL / GEO-RESTRICTION: Admin Access
        location /api/admin/ {
            # In the real world, you would allow your specific office IP ranges (e.g., Mexico HQ)
            # allow 189.200.50.0/24;             
            # For this lab, we will explicitly block all access to the admin panel at the edge
            deny all;
        }
    }
}
